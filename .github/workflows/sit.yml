name: SIT Playwright chromium
on:
  workflow_dispatch:

jobs:
  playwright-tests:
    timeout-minutes: 60
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install

    - name: Run your tests
      run: |
        pytest --robot-outputdir reports --headed --browser chromium  tests/ -s -v --target-env config/uat_config.json

    - name: Upload test artifacts
      uses: actions/upload-artifact@v4
      if: success() || failure()
      with:
        name: playwright-results       
        path: reports/
        retention-days: 30
