name: uat Playwright firefox Tests
on:
 workflow_dispatch:

jobs:
  deploy-code:
    timeout-minutes: 60
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

  install-dependencies:
      name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

      name: Install playwright packages
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

     name: Install Playwright browsers and dependencies
     run: |
        playwright install 
  
  executing-playwright-test:
    - name: Run your tests
      run: |
        pytest  --robot-outputdir  reports  --headed   --browser firefox   tests/   -s -v  --target-env  config/uat_config.json

  creating-artifacts:  
    - name: upload test artifacts
      uses: actions/upload-artifact@v4
      if: success() || failure()
      with:
        name: playwright-results       
        path: reports/
        retention-days: 30            
