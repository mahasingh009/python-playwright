name: DEV Playwright firefox 
on:
  workflow_dispatch:

jobs:
  # Stage 1: Install and Cache Everything
  setup-environment:
    timeout-minutes: 15
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
        cache: 'pip' # Automatically caches pip dependencies

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Cache the Playwright browsers so they don't re-download in the next job
    - name: Cache Playwright Browsers
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}

    - name: Install Playwright Browsers
      run: playwright install firefox

  # Stage 2: Run the Tests (Fast because it pulls from Cache)
  run-tests:
    timeout-minutes: 45
    runs-on: windows-latest
    needs: setup-environment
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
        cache: 'pip' # Restores cached pip dependencies instantly

    - name: Restore Playwright Browsers
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}

    - name: Run your tests
      run: |
        pytest --robot-outputdir reports --headed --browser firefox  tests/ -s -v --target-env config/uat_config.json

  # Stage 3: Publish Results
  publish-results:
    runs-on: windows-latest
    needs: run-tests
    if: always()
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Upload test artifacts
      uses: actions/upload-artifact@v4
      with:
        name: playwright-results       
        path: reports/
        retention-days: 30
