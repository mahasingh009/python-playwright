name: uat Playwright firefox Tests
on:
 workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers and dependencies
      run: |
        playwright install 

    - name: Run your tests
      run: |
        pytest  --robot-outputdir  reports  --headed   --browser firefox   tests/   -s -v  --target-env  config/uat_config.json

    
    - name: upload test artifacts
      uses: actions/upload-artifact@v4
      if: success() || failure()
      with:
        name: playwright-results       
        path: reports/
        retention-days: 30            
